<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#faf8f5" />
    <title>薬院習字</title>
    <meta name="description" content="6種の筆で書道の表現を楽しむ。書く、捨てる、遊ぶ。" />
    <meta property="og:title" content="薬院習字" />
    <meta property="og:description" content="6種の筆で書道の表現を楽しむ。書く、捨てる、遊ぶ。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shuji.anshin.kids/" />
    <meta property="og:image" content="https://shuji.anshin.kids/assets/ogp.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://shuji.anshin.kids/assets/ogp.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="washi-bg"></div>
    <canvas id="canvas"></canvas>
    <div id="transition-overlay"></div>

    <img id="rakkan" src="assets/rakkan.png" alt="薬院" />
    <button id="brush-change-btn" aria-label="筆を変える">筆</button>

    <!-- ══════ 筆選択 ══════ -->
    <div id="brush-panel">
      <div class="brush-panel-inner">
        <p class="brush-panel-title">筆を選ぶ</p>
        <div class="brush-grid">
          <button class="brush-option" data-brush="youmou_thick">
            <span class="brush-name">羊毛筆（太）</span>
            <span class="brush-stroke stroke-thick"></span>
            <span class="brush-desc">ふっくら潤筆</span>
          </button>
          <button class="brush-option active" data-brush="youmou_std">
            <span class="brush-name">羊毛筆</span>
            <span class="brush-stroke stroke-std"></span>
            <span class="brush-desc">強弱自在</span>
          </button>
          <button class="brush-option" data-brush="chouchouhou">
            <span class="brush-name">長々鋒</span>
            <span class="brush-stroke stroke-thin"></span>
            <span class="brush-desc">繊細な細線</span>
          </button>
          <button class="brush-option" data-brush="usagi">
            <span class="brush-name">兎毛筆</span>
            <span class="brush-stroke stroke-sharp"></span>
            <span class="brush-desc">鋭い硬筆</span>
          </button>
          <button class="brush-option" data-brush="take">
            <span class="brush-name">竹筆</span>
            <span class="brush-stroke stroke-bamboo"></span>
            <span class="brush-desc">バサバサの線</span>
          </button>
          <button class="brush-option" data-brush="keimou">
            <span class="brush-name">鶏毛筆</span>
            <span class="brush-stroke stroke-bounce"></span>
            <span class="brush-desc">ペタペタ質感</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ══════ CYBER SURVIVOR Result Screen ══════ -->
    <div id="game-result">
      <div class="result-inner cyber-result">
        <p class="cyber-title">GAME<br>OVER</p>
        <div class="cyber-stats">
          <div class="cyber-stat">
            <span class="cyber-stat-label">SCORE</span>
            <span class="cyber-stat-value" id="result-score">0</span>
          </div>
          <div class="cyber-stat">
            <span class="cyber-stat-label">HITS</span>
            <span class="cyber-stat-value" id="result-kills">0</span>
          </div>
          <div class="cyber-stat">
            <span class="cyber-stat-label">WAVE</span>
            <span class="cyber-stat-value" id="result-wave">1</span>
          </div>
        </div>
        <p class="cyber-new" id="result-new">★ NEW HI-SCORE ★</p>
        <p class="cyber-high">HI-SCORE: <span id="result-high">0</span></p>
        <!-- Name Input for TOP 10 -->
        <div id="lb-name-input-area">
          <p class="lb-qualify">🎉 TOP 10 入り！名前を登録</p>
          <div class="lb-input-row">
            <input id="lb-name" type="text" maxlength="8" placeholder="なまえ（8文字以内）" autocomplete="off" />
            <button id="lb-submit-btn" class="cyber-btn lb-submit">登録</button>
          </div>
        </div>
        <div class="result-buttons">
          <button id="game-replay" class="cyber-btn">RETRY</button>
          <button id="game-ranking-btn" class="cyber-btn cyber-btn-rank">🏆 RANKING</button>
          <button id="game-exit" class="cyber-btn cyber-btn-exit">EXIT</button>
        </div>
      </div>
    </div>

    <!-- ══════ In-Game Exit Button ══════ -->
    <button id="game-exit-ingame" class="game-exit-btn" aria-label="Exit game">✕</button>

    <div id="onboarding">
      <p>書く<span class="sub">（一本指）</span></p>
      <p>捨てる<span class="sub">（二本指）</span></p>
      <p>遊ぶ<span class="sub">（左下の印）</span></p>
    </div>

    <!-- ══════ Idle Hint (2-finger swipe) ══════ -->
    <div id="idle-hint">
      <p>二本指でしゅっとスワイプすると<br>白紙に戻せます</p>
      <button id="idle-hint-close" aria-label="閉じる">✕</button>
    </div>

    <!-- ══════ Leaderboard Panel ══════ -->
    <div id="leaderboard-panel">
      <div class="lb-inner">
        <div class="lb-header">
          <h2 class="lb-title">🏆 RANKING</h2>
          <button id="lb-close" class="lb-close-btn">✕</button>
        </div>
        <div class="lb-tabs">
          <button class="lb-tab active" data-tab="alltime">ALL TIME</button>
          <button class="lb-tab" data-tab="today">TODAY</button>
        </div>
        <table class="lb-table">
          <thead><tr><th></th><th>NAME</th><th>SCORE</th><th>WAVE</th><th>DATE</th></tr></thead>
          <tbody id="lb-tbody"></tbody>
        </table>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="brushes.js"></script>
    <script src="game.js"></script>
    <script src="leaderboard.js"></script>
    <script src="app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    </script>
  </body>
</html>
